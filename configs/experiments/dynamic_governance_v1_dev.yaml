experiment:
  name: dynamic_governance_v1_dev
  run_id: dynamic_governance_v1_dev_phase5
  seeds: [2000, 2001]
  episode_steps: 6
  env:
    id: dynamic_governance_dev_env
    type: text_safety_stream
    params:
      episode_steps: 6
      schedule:
        id: development_dynamic_governance_v1
        type: piecewise
        phases:
          - name: clean_start
            steps: [0, 1]
            corruption_level: 0.00
            transforms: []
          - name: development_prompt_injection
            steps: [2, 4]
            corruption_level: 0.40
            transforms:
              - type: prompt_injection
                p: 0.50
          - name: recovery
            steps: [5, 5]
            corruption_level: 0.10
            transforms:
              - type: residual_drift
                strength: 0.05
  methods:
    - id: mavs_gc_dynamic_dev
      type: mavs_gc
      params:
        ablation:
          name: full_mavs_gc
  metrics:
    - trace_completeness
  outputs:
    raw_traces: results/raw/dynamic_governance_v1_dev.jsonl
  metadata:
    phase: phase5
    benchmark_set: dynamic_governance_v1_dev
    seed_policy: development_validation_seed_range_2000_2999
    model_training: none

