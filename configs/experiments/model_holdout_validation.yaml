experiment:
  name: model_holdout_validation
  run_id: model_holdout_validation_phase5
  seeds: [2000, 2001]
  episode_steps: 6
  env:
    id: model_holdout_tool_env
    type: tool_use_security
    params:
      episode_steps: 6
      schedule:
        id: development_holdout_tool_use
        type: piecewise
        phases:
          - name: clean_start
            steps: [0, 1]
            corruption_level: 0.00
            transforms: []
          - name: holdout_prompt_injection
            steps: [2, 4]
            corruption_level: 0.45
            transforms:
              - type: prompt_injection
                p: 0.60
              - type: evidence_masking
                p: 0.50
          - name: recovery
            steps: [5, 5]
            corruption_level: 0.10
            transforms:
              - type: residual_drift
                strength: 0.05
  methods:
    - id: mavs_gc_holdout_validation
      type: mavs_gc
      params:
        ablation:
          name: full_mavs_gc
  metrics:
    - unsafe_acceptance_rate
    - false_rejection_rate
    - trace_completeness
  outputs:
    raw_traces: results/raw/model_holdout_validation.jsonl
  metadata:
    phase: phase5
    benchmark_set: model_holdout_validation
    seed_policy: development_validation_seed_range_2000_2999
    model_training: none
    holdout_family_disjoint_from_training: true

