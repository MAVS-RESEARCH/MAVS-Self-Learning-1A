schema_version: 1.0.0
development_sweeps:
  confidence_gate: {reject_below: [0.25, 0.35, 0.45], escalate_below: [0.50, 0.60, 0.70]}
  selective: {risk_threshold: [0.35, 0.45, 0.55, 0.65], escalation_band: [0.05, 0.10, 0.15]}
  neyman_pearson: {unsafe_risk_limit: [0.01, 0.025, 0.05], likelihood_ratio: [1.5, 2.0, 3.0]}
  conformal: {alpha: [0.01, 0.05, 0.10], window: [32, 64, 128]}
  drift: {window: [16, 32, 64], delta: [0.01, 0.025, 0.05]}
  online_experts: {eta: [0.01, 0.05, 0.10, 0.20]}
  ctta: {learning_rate: [0.00001, 0.0001, 0.001], confidence: [0.80, 0.90, 0.95], update_frequency: [1, 8, 32]}
resource_budgets:
  calls_per_decision: 1
  tokens_per_decision: 0
  latency_ms_per_decision: 5.0
  memory_bytes: 1048576
  updates_per_released_feedback: 1
selection: {bank: development_only, objective: lexicographic_uar_then_frr_then_escalation, post_holdout_retuning: false}
