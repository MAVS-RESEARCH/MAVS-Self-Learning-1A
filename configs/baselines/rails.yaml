rails:
  - name: input_check_rail
    type: input_check
    risk: 0.65
    patterns:
      - override system
      - ignore policy
  - name: jailbreak_rail
    type: jailbreak_heuristic
    risk: 0.85
    patterns:
      - ignore prior
      - bypass
      - jailbreak
  - name: pii_rail
    type: pii_check
    risk: 0.80
  - name: unsafe_tool_rail
    type: unsafe_tool_call
    risk: 0.90
    blocked_tools:
      - shell_exec
      - delete_file
  - name: topic_block_rail
    type: topic_block
    risk: 0.70
    topics:
      - malware
      - credential theft
  - name: output_block_rail
    type: output_block
    risk: 0.70
    patterns:
      - leaked credential
      - exfiltration steps
  - name: risk_predicate_rail
    type: risk_predicate
    risk: 0.75
    min_risk: 0.70
  - name: deterministic_predicate_rail
    type: deterministic_predicate
    risk: 0.75
    min_risk: 0.80
